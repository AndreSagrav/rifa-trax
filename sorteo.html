<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sorteo Chevrolet Trax 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@600;700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#040405;
  --bg-soft:#0a0b0f;
  --gold:#FFD600;
  --gold-soft:#ffec9a;
  --gold-deep:#d8a300;
  --red:#ff3d33;
  --ink:#141414;
  --line:rgba(255,214,0,.24);
  --line-soft:rgba(255,214,0,.12);
}
html,body{
  width:100%;
  height:100%;
  background:radial-gradient(ellipse 60% 45% at 50% 38%,rgba(255,214,0,.08) 0%,rgba(0,0,0,0) 70%),
             radial-gradient(ellipse 80% 60% at 75% 10%,rgba(255,61,51,.11) 0%,rgba(0,0,0,0) 72%),
             radial-gradient(ellipse 70% 55% at 20% 5%,rgba(79,195,247,.08) 0%,rgba(0,0,0,0) 75%),
             linear-gradient(180deg,var(--bg-soft) 0%,var(--bg) 48%,#020202 100%);
  color:#F0EEE9;
  font-family:'Manrope',sans-serif;
  overflow:hidden;
}

/* ── ATMOSPHERE ── */
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.95;filter:saturate(1.2)}
.aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;mix-blend-mode:screen;opacity:.28;filter:blur(38px)}
.aurora.a1{background:radial-gradient(circle at 20% 35%,rgba(255,214,0,.5),transparent 45%),radial-gradient(circle at 72% 45%,rgba(255,61,51,.35),transparent 42%);animation:driftA 16s ease-in-out infinite}
.aurora.a2{background:radial-gradient(circle at 68% 20%,rgba(79,195,247,.38),transparent 42%),radial-gradient(circle at 40% 70%,rgba(255,214,0,.25),transparent 48%);animation:driftB 22s ease-in-out infinite}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.2;background-image:radial-gradient(rgba(255,255,255,.08) 0.6px,transparent 0.6px);background-size:3px 3px;mix-blend-mode:soft-light}
.vign{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 85% 85% at 50% 50%,transparent 32%,rgba(0,0,0,.82) 100%)}
.scan{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 6px);
  opacity:.6}
@keyframes driftA{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(-3%,2%,0) scale(1.08)}}
@keyframes driftB{0%,100%{transform:translate3d(0,0,0) scale(1)}50%{transform:translate3d(4%,-2%,0) scale(1.06)}}

/* ── FLASH ── */
#flash{position:fixed;inset:0;z-index:300;background:#fff;opacity:0;pointer-events:none;display:none}
#flash.on{display:block;animation:flashout .5s ease forwards}
@keyframes flashout{0%{opacity:.9}100%{opacity:0}}
#state-wash{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.22;mix-blend-mode:screen;transition:background .7s ease,opacity .7s ease}
body.st-pendiente #state-wash{background:radial-gradient(ellipse 55% 40% at 50% 40%,rgba(255,255,255,.06) 0%,transparent 72%)}
body.st-girando #state-wash{background:radial-gradient(ellipse 60% 45% at 50% 38%,rgba(255,214,0,.22) 0%,rgba(255,170,0,.08) 42%,transparent 74%);opacity:.34}
body.st-revelado #state-wash{background:radial-gradient(ellipse 60% 46% at 50% 40%,rgba(0,210,90,.2) 0%,rgba(79,195,247,.12) 44%,transparent 76%);opacity:.36}

/* ── CEREMONY CUE ── */
#cue{position:fixed;inset:0;z-index:260;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .45s ease}
#cue.show{opacity:1}
.cue-wrap{position:relative;display:flex;align-items:center;justify-content:center;min-width:min(92vw,780px);padding:24px}
.cue-ring{position:absolute;inset:0;border-radius:999px;border:1px solid rgba(255,214,0,.28);box-shadow:0 0 36px rgba(255,214,0,.2),inset 0 0 34px rgba(255,214,0,.08);background:radial-gradient(circle at 50% 50%,rgba(255,214,0,.09) 0%,rgba(0,0,0,.1) 58%,transparent 100%);animation:cuePulse 2.2s ease-in-out infinite}
.cue-line{position:absolute;left:9%;right:9%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,214,0,.8),transparent)}
.cue-line.top{top:10px}
.cue-line.bottom{bottom:10px}
#cuet{position:relative;font-family:'Cinzel',serif;font-weight:700;font-size:clamp(14px,2.2vw,26px);letter-spacing:4px;text-transform:uppercase;color:#fff8da;text-align:center;text-shadow:0 0 18px rgba(255,214,0,.5),0 0 42px rgba(255,214,0,.2)}
.cue-meta{position:absolute;left:50%;bottom:-12px;transform:translateX(-50%);width:min(70vw,440px);display:none;align-items:center;gap:10px}
#cue.verify .cue-meta{display:flex}
#cuecount{font-family:'Bebas Neue',sans-serif;color:#e4f2ff;font-size:clamp(18px,3vw,30px);letter-spacing:2px;min-width:44px;text-align:right;text-shadow:0 0 16px rgba(79,195,247,.35)}
.cue-meter{flex:1;height:7px;border-radius:999px;border:1px solid rgba(79,195,247,.3);background:rgba(7,16,24,.55);overflow:hidden}
#cuefill{height:100%;width:100%;background:linear-gradient(90deg,rgba(79,195,247,.9),rgba(255,214,0,.95));transform-origin:left center;transform:scaleX(1)}
#cue.prep #cuet{color:#fff2c0}
#cue.verify #cuet{color:#e5f4ff;text-shadow:0 0 18px rgba(79,195,247,.45),0 0 34px rgba(79,195,247,.22)}
#cue.winner #cuet{color:#fff9dd;text-shadow:0 0 20px rgba(255,214,0,.65),0 0 44px rgba(255,214,0,.3)}
@keyframes cuePulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.03);opacity:1}}

/* ── MAIN ── */
#main{position:relative;z-index:2;width:100%;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(8px,1.2vh,20px);padding:18px;max-width:min(1220px,96vw);margin:0 auto}

/* ── LIVE PILL ── */
.live-pill{display:flex;align-items:center;gap:7px;
  padding:7px 18px;border-radius:40px;
  border:1px solid rgba(255,61,51,.45);background:linear-gradient(135deg,rgba(255,40,40,.16),rgba(120,0,0,.08));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 8px 26px rgba(255,40,40,.12);
  font-size:clamp(8px,1vw,10px);font-weight:800;letter-spacing:4px;color:#ff776d}
.live-dot{width:6px;height:6px;border-radius:50%;background:#FF4545;
  animation:livep .9s ease-in-out infinite}
@keyframes livep{0%,100%{box-shadow:0 0 0 0 rgba(255,69,69,.7)}50%{box-shadow:0 0 0 6px transparent}}

/* ── TITLE ── */
.ttop{font-size:clamp(10px,1.3vw,14px);letter-spacing:10px;color:#818181;text-transform:uppercase;text-align:center;font-family:'Cinzel',serif}
.tmain{font-family:'Bebas Neue',sans-serif;
  font-size:clamp(56px,10vw,120px);line-height:.86;text-align:center;
  text-shadow:0 8px 40px rgba(0,0,0,.86),0 0 110px rgba(255,214,0,.12)}
.tmain .gold{color:var(--gold);text-shadow:0 0 64px rgba(255,214,0,.7),0 0 120px rgba(255,214,0,.22)}
.tsub{font-size:clamp(8px,1vw,11px);letter-spacing:4px;color:#676767;text-align:center;text-transform:uppercase}

/* ── BADGE ── */
#badge{display:inline-flex;align-items:center;gap:8px;
  padding:8px 24px;border-radius:30px;
  font-size:clamp(8px,1vw,10px);font-weight:800;letter-spacing:3px;text-transform:uppercase;
  transition:all .5s;backdrop-filter:blur(4px)}
#badge.pen{background:rgba(255,255,255,.04);color:#5a5a5a;border:1px solid #232323}
#badge.gir{background:rgba(255,214,0,.09);color:var(--gold);border:1px solid rgba(255,214,0,.38);
  animation:bglow .7s ease-in-out infinite;box-shadow:0 0 34px rgba(255,214,0,.22),inset 0 0 24px rgba(255,214,0,.1)}
#badge.rev{background:rgba(0,210,90,.1);color:#00D25A;border:1px solid rgba(0,210,90,.35);
  box-shadow:0 0 26px rgba(0,210,90,.18),inset 0 0 16px rgba(0,210,90,.08)}
.bdot{width:7px;height:7px;border-radius:50%;background:currentColor}
@keyframes bglow{0%,100%{box-shadow:0 0 12px rgba(255,214,0,.15)}50%{box-shadow:0 0 32px rgba(255,214,0,.45)}}

/* ── WHEELS ── */
#wheels{display:flex;align-items:center;gap:clamp(5px,1.2vw,18px)}

.wsep{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5.5vw,68px);
  color:#2c2c2c;line-height:1;
  text-shadow:0 1px 0 rgba(255,255,255,.04)}

.wbox{position:relative;display:flex;flex-direction:column;align-items:center}

.wheel{
  width:clamp(100px,15.5vw,185px);
  height:clamp(128px,20vw,240px);
  position:relative;border-radius:14px;overflow:hidden;
  background:linear-gradient(180deg,#0f1012 0%,#070708 100%);
  border:1px solid #2a2a2a;
  box-shadow:0 0 0 1px #0a0a0a,0 16px 45px rgba(0,0,0,.95),
    inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.6),0 0 30px rgba(255,214,0,.06);
  transition:border-color .35s,box-shadow .35s}

/* top & bottom depth fades */
.wheel::after{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(180deg,
    rgba(6,6,6,.95) 0%,rgba(6,6,6,.35) 20%,
    transparent 32%,transparent 68%,
    rgba(6,6,6,.35) 80%,rgba(6,6,6,.95) 100%)}

/* selection window */
.wheel::before{content:'';position:absolute;inset:0;top:auto;bottom:auto;z-index:2;pointer-events:none;
  height:clamp(40px,8.5vw,80px);
  background:linear-gradient(180deg,rgba(255,214,0,.06),rgba(255,214,0,.14),rgba(255,214,0,.06));
  border-top:1px solid rgba(255,214,0,.5);
  border-bottom:1px solid rgba(255,214,0,.5);
  box-shadow:0 0 35px rgba(255,214,0,.24),inset 0 0 22px rgba(255,214,0,.1)}

.wheel.spinning{
  border-color:rgba(255,214,0,.55) !important;
  box-shadow:0 0 0 1px rgba(255,214,0,.18),0 0 50px rgba(255,214,0,.34),
    0 8px 40px rgba(0,0,0,.95),inset 0 1px 0 rgba(255,255,255,.05) !important}

.wheel.landed{animation:wland .45s ease-out}
@keyframes wland{
  0%{box-shadow:0 0 0 2px rgba(255,255,255,.8),0 0 70px rgba(255,255,255,.35),0 8px 40px rgba(0,0,0,.95)}
  100%{box-shadow:0 0 0 1px rgba(255,214,0,.25),0 0 28px rgba(255,214,0,.18),0 8px 40px rgba(0,0,0,.95)}}

.wstrip{position:absolute;width:100%;display:flex;flex-direction:column;align-items:center;top:0;z-index:1}

.wdig{width:100%;height:clamp(40px,8.5vw,80px);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,7.5vw,74px);
  color:#171717;flex-shrink:0;letter-spacing:1px;
  transition:color .25s,text-shadow .25s}
.wdig.active{
  color:#FFD600 !important;
  text-shadow:0 0 18px rgba(255,214,0,.95),0 0 40px rgba(255,214,0,.5),0 0 80px rgba(255,214,0,.2)}

/* ── MESSAGE ── */
#msg{font-size:clamp(9px,1.1vw,12px);color:#818181;letter-spacing:2px;font-style:italic;text-align:center}

/* ── WINNER OVERLAY ── */
#winner-ov{display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;flex-direction:column}
#winner-ov.show{display:flex}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.88);
  animation:ovfadein .7s ease forwards}
@keyframes ovfadein{from{opacity:0}to{opacity:1}}

/* radial glow behind card */
.ov-glow{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 55% at 50% 50%,rgba(255,214,0,.1) 0%,transparent 70%);
  animation:oglow 2.2s ease-in-out infinite}
@keyframes oglow{0%,100%{opacity:.7}50%{opacity:1.2}}

/* winner card */
.wcard{position:relative;z-index:1;
  border:2px solid rgba(255,214,0,.55);border-radius:22px;
  padding:clamp(24px,3.5vw,52px) clamp(32px,5vw,80px);
  background:linear-gradient(180deg,rgba(10,10,10,.97),rgba(5,5,5,.98));
  box-shadow:0 0 0 1px rgba(255,214,0,.1),0 0 80px rgba(255,214,0,.3),0 24px 70px rgba(0,0,0,.85);
  text-align:center;max-width:min(88vw,680px);width:100%;
  animation:cardin .75s cubic-bezier(.23,1,.32,1) both}
@keyframes cardin{from{opacity:0;transform:scale(.88) translateY(28px)}to{opacity:1;transform:none}}

/* shimmer line */
.wcard::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,214,0,.8),transparent);
  animation:shmr 2.5s ease-in-out infinite}
@keyframes shmr{0%,100%{opacity:.5}50%{opacity:1}}

.wcard-label{font-size:clamp(9px,1.1vw,11px);letter-spacing:5px;text-transform:uppercase;
  color:#FFD600;font-weight:800;margin-bottom:14px;font-family:'Cinzel',serif}
.wcard-trophy{font-size:clamp(28px,4.5vw,52px);margin-bottom:6px;
  display:inline-block;animation:tbounce .5s ease .7s both}
@keyframes tbounce{0%{transform:scale(0) rotate(-20deg)}65%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

#wnom{font-family:'Bebas Neue',sans-serif;
  font-size:clamp(30px,5.5vw,68px);
  color:#FFD600;margin:4px 0;line-height:1;
  animation:nglow 2s ease-in-out 1.2s infinite alternate}
@keyframes nglow{from{text-shadow:0 0 20px rgba(255,214,0,.4)}to{text-shadow:0 0 50px rgba(255,214,0,.9),0 0 100px rgba(255,214,0,.3)}}

#wced{font-size:clamp(10px,1.3vw,13px);color:#555;letter-spacing:2px;margin:10px 0 18px}

.wnum-pill{display:inline-block;
  background:rgba(255,214,0,.07);border:1px solid rgba(255,214,0,.25);
  border-radius:8px;padding:8px 24px}
#wnum{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,3.5vw,44px);
  color:#FFD600;letter-spacing:8px}

/* ── CLOSE ── */
#close{position:fixed;top:16px;left:16px;z-index:999;
  background:rgba(6,6,6,.78);border:1px solid rgba(255,214,0,.25);
  color:#747474;font-family:'Manrope',sans-serif;font-weight:800;
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  padding:9px 17px;border-radius:6px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
#close:hover{color:#FFD600;border-color:rgba(255,214,0,.5)}
#proj-badge{position:fixed;top:16px;right:16px;z-index:999;padding:8px 12px;border-radius:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:800;color:#8f8f8f;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.45);backdrop-filter:blur(4px);opacity:0;transition:opacity .25s ease,color .25s ease,border-color .25s ease}
body.proj #proj-badge{opacity:1;color:#fff3c5;border-color:rgba(255,214,0,.5)}

/* ── CONFETTI ── */
.conf{position:fixed;pointer-events:none;z-index:999;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}

body.proj .scan{opacity:.2}
body.proj .grain{opacity:.08}
body.proj .vign{background:radial-gradient(ellipse 90% 88% at 50% 50%,transparent 40%,rgba(0,0,0,.66) 100%)}
body.proj .ttop{font-size:clamp(12px,1.6vw,18px);letter-spacing:12px;color:#c6c6c6}
body.proj .tmain{font-size:clamp(70px,12vw,164px)}
body.proj .tsub{font-size:clamp(10px,1.4vw,15px);letter-spacing:5px;color:#999}
body.proj #badge{transform:scale(1.08)}
body.proj #msg{font-size:clamp(12px,1.5vw,18px);color:#c7c7c7;letter-spacing:3px}
body.proj .wheel{width:clamp(120px,18vw,220px);height:clamp(150px,23vw,280px)}
body.proj #close{transform:scale(1.05)}
</style>
</head>

<canvas id="cvs"></canvas>
<div class="aurora a1"></div>
<div class="aurora a2"></div>
<div class="grain"></div>

<div id="flash"></div>
<div id="state-wash"></div>
<div id="cue"><div class="cue-wrap"><div class="cue-ring"></div><div class="cue-line top"></div><div class="cue-line bottom"></div><div id="cuet">Preparando sorteo oficial</div><div class="cue-meta"><span id="cuecount">1.5</span><div class="cue-meter"><div id="cuefill"></div></div></div></div></div>

<div id="main">
  <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>

  <div>

    <div class="wsep">·</div>
    <div class="wbox"><div class="wheel" id="w3"><div class="wstrip" id="ws3"></div></div></div>

  <p id="msg">Transmisión en vivo — El sorteo comenzará en breve...</p>
</div>

</div>

<button id="close" onclick="window.close()">✕ Cerrar</button>

// ── SOUND ENGINE ──────────────────────────────────
var AUDIO={ctx:null,master:null,comp:null,unlocked:false};
function _ctx(){
  try{
    if(!AUDIO.ctx){
      AUDIO.ctx=new(window.AudioContext||window.webkitAudioContext)();
      AUDIO.comp=AUDIO.ctx.createDynamicsCompressor();
      AUDIO.comp.threshold.value=-28;
      AUDIO.comp.knee.value=22;
      AUDIO.comp.ratio.value=8;
      AUDIO.comp.attack.value=.005;

      AUDIO.master.gain.value=.82;
      AUDIO.master.connect(AUDIO.comp);
      AUDIO.comp.connect(AUDIO.ctx.destination);
    }
    return AUDIO.ctx;
  }catch(e){return null;}
}
function _out(){ return AUDIO.master||(_ctx()&&AUDIO.master); }
function unlockAudio(){
  var c=_ctx(); if(!c) return;
  if(c.state==='suspended') c.resume();
  AUDIO.unlocked=true;
}
window.addEventListener('pointerdown',unlockAudio,{once:true});
window.addEventListener('keydown',unlockAudio,{once:true});

function playBuildSound(){

    var o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(out);
    o.type='sawtooth';
    o.frequency.setValueAtTime(50,c.currentTime);
    o.frequency.linearRampToValueAtTime(110,c.currentTime+1.4);
    g.gain.setValueAtTime(0,c.currentTime);
    g.gain.linearRampToValueAtTime(0.07,c.currentTime+.5);
    g.gain.linearRampToValueAtTime(0,c.currentTime+1.6);
    o.start(); o.stop(c.currentTime+1.7);
    // high hiss build
    var buf=c.createBuffer(1,Math.floor(c.sampleRate*1.6),c.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*.07*(i/d.length);
    var s=c.createBufferSource(), f=c.createBiquadFilter(), g2=c.createGain();
    f.type='highpass'; f.frequency.value=5000;
    s.buffer=buf; s.connect(f); f.connect(g2); g2.connect(out);
    g2.gain.value=.6; s.start();
  }catch(e){}
}

function playRevealSting(){
  try{
    var c=_ctx(),out=_out(); if(!c||!out) return;
    var o1=c.createOscillator(),g1=c.createGain();
    o1.connect(g1); g1.connect(out);
    o1.type='triangle';
    o1.frequency.setValueAtTime(370,c.currentTime);
    o1.frequency.linearRampToValueAtTime(620,c.currentTime+.38);
    g1.gain.setValueAtTime(0,c.currentTime);
    g1.gain.linearRampToValueAtTime(.14,c.currentTime+.06);
    g1.gain.exponentialRampToValueAtTime(.001,c.currentTime+.55);
    o1.start(); o1.stop(c.currentTime+.58);

    var o2=c.createOscillator(),g2=c.createGain();
    o2.connect(g2); g2.connect(out);
    o2.type='sine';
    o2.frequency.setValueAtTime(880,c.currentTime+.18);
    g2.gain.setValueAtTime(0,c.currentTime+.18);
    g2.gain.linearRampToValueAtTime(.12,c.currentTime+.24);
    g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.8);
    o2.start(c.currentTime+.18); o2.stop(c.currentTime+.82);
  }catch(e){}
}

function queueTimer(fn,ms){
  var id=setTimeout(fn,ms);
  flowTimers.push(id);
  return id;
}

function clearFlowTimers(){
  flowTimers.forEach(function(id){clearTimeout(id);});
  flowTimers=[];
}

function clearCueCountdown(){
  if(cueInterval){clearInterval(cueInterval);cueInterval=null;}
  var c=document.getElementById('cuecount');
  var f=document.getElementById('cuefill');
  if(c) c.textContent='';
  if(f) f.style.transform='scaleX(1)';
}

function setStage(stage){
  document.body.classList.remove('st-pendiente','st-girando','st-revelado');
  document.body.classList.add('st-'+stage);
}

function setProjectorMode(enabled){
  projectorMode=!!enabled;
  document.body.classList.toggle('proj',projectorMode);
  try{localStorage.setItem('rifa_projector',projectorMode?'1':'0');}catch(e){}
}

function initProjectorMode(){
  var params=new URLSearchParams(window.location.search);
  var q=params.get('mode');
  var qp=params.get('projector');
  var byQuery=(q&&q.toLowerCase()==='proyector')||qp==='1';
  var byStore=false;
  try{byStore=localStorage.getItem('rifa_projector')==='1';}catch(e){}
  setProjectorMode(byQuery||byStore);
}

function startCueCountdown(ms){
  clearCueCountdown();
  var countEl=document.getElementById('cuecount');
  var fillEl=document.getElementById('cuefill');
  if(!countEl||!fillEl) return;
  var start=Date.now();
  function tick(){
    var elapsed=Date.now()-start;
    var left=Math.max(0,ms-elapsed);
    var sec=(left/1000).toFixed(1);
    countEl.textContent=sec;
    fillEl.style.transform='scaleX('+(left/ms)+')';
    if(left<=0){clearCueCountdown();}
  }
  tick();
  cueInterval=setInterval(tick,100);
}

function showCue(text,mode){
  var cue=document.getElementById('cue');
  var cuet=document.getElementById('cuet');
  if(!cue||!cuet) return;
  cue.className='show'+(mode?' '+mode:'');
  cuet.textContent=text;
}

function hideCue(){
  var cue=document.getElementById('cue');
  if(!cue) return;
  clearCueCountdown();
  cue.className='';
}

function startRevealSequence(digs){
  showCue('Verificación notarial en curso','verify');
  startCueCountdown(1500);
  playRevealSting();
  queueTimer(function(){
    hideCue();
    showWinner(digs);
  },1500);
}

function playSpinSound(dur){
  try{
    var c=_ctx(),out=_out(); if(!c||!out) return;
    var whoosh=c.createOscillator(),wg=c.createGain();
    whoosh.connect(wg); wg.connect(out);
    whoosh.type='triangle';
    whoosh.frequency.setValueAtTime(220,c.currentTime);
    whoosh.frequency.exponentialRampToValueAtTime(85,c.currentTime+dur/1000);
    wg.gain.setValueAtTime(.06,c.currentTime);
    wg.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur/1000);
    whoosh.start(); whoosh.stop(c.currentTime+dur/1000+.05);
    var steps=Math.floor(dur/42);
    for(var i=0;i<steps;i++){
      (function(i){
        var t=c.currentTime+(dur/1000)*Math.pow(i/steps,.55);
        var buf=c.createBuffer(1,Math.floor(c.sampleRate*.013),c.sampleRate);
        var d=buf.getChannelData(0);
        for(var j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.pow(1-j/d.length,2);
        var src=c.createBufferSource(), fi=c.createBiquadFilter(), g=c.createGain();
        fi.type='bandpass'; fi.frequency.value=500+i*(500/steps); fi.Q.value=2.5;
        g.gain.value=.2;
        src.buffer=buf; src.connect(fi); fi.connect(g); g.connect(out);
        src.start(t);
      })(i);
    }
  }catch(e){}
}

function playLandSound(){
  try{
    var c=_ctx(),out=_out(); if(!c||!out) return;
    // mechanical thud
    var buf=c.createBuffer(1,Math.floor(c.sampleRate*.2),c.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*1.8*Math.pow(1-i/d.length,1.6);
    var src=c.createBufferSource(), fi=c.createBiquadFilter(), g=c.createGain();
    fi.type='lowpass'; fi.frequency.value=380;
    g.gain.value=.55;
    src.buffer=buf; src.connect(fi); fi.connect(g); g.connect(out);
    src.start();
    // bright ding
    var o=c.createOscillator(), og=c.createGain();
    o.connect(og); og.connect(out);
    o.type='sine'; o.frequency.value=1175;
    og.gain.setValueAtTime(.28,c.currentTime+.015);
    og.gain.exponentialRampToValueAtTime(.001,c.currentTime+.55);
    o.start(c.currentTime+.015); o.stop(c.currentTime+.6);
  }catch(e){}
}

function playWinnerSound(){
  try{
    var c=_ctx(),out=_out(); if(!c||!out) return;
    // ascending fanfare
    [523,659,784,880,1047,1319,1568,2093].forEach(function(f,i){
      var o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(out);
      o.type='sine'; o.frequency.value=f;
      var t=c.currentTime+i*.1;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.28,t+.065);
      g.gain.exponentialRampToValueAtTime(.001,t+.95);
      o.start(t); o.stop(t+1);
    });
    // sustained C-major chord
    [523,659,784,1047].forEach(function(f){
      var o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(out);
      o.type='triangle'; o.frequency.value=f;
      var t=c.currentTime+.85;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.12,t+.18);
      g.gain.exponentialRampToValueAtTime(.001,t+3.8);
      o.start(t); o.stop(t+4);
    });
    // bass impact
    var ob=c.createOscillator(), gb=c.createGain();
    ob.connect(gb); gb.connect(out);
    ob.type='sine';
    ob.frequency.setValueAtTime(140,c.currentTime);
    ob.frequency.exponentialRampToValueAtTime(35,c.currentTime+.65);
    gb.gain.setValueAtTime(.45,c.currentTime);
    gb.gain.exponentialRampToValueAtTime(.001,c.currentTime+.75);
    ob.start(); ob.stop(c.currentTime+.8);
  }catch(e){}
}

// ── PARTICLE SYSTEM ───────────────────────────────
(function(){
  var cvs=document.getElementById('cvs');
  var ctx=cvs.getContext('2d');
  var W,H;
  var COLS=['#FFD600','#FFA500','#fff','#FF6B35','#FFE55C'];
  var pts=[], sparks=[];

  function resize(){ W=cvs.width=window.innerWidth; H=cvs.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);

  for(var i=0;i<75;i++) pts.push({
    x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
    r:Math.random()*1.6+.3,
    vy:-(Math.random()*.32+.08), vx:(Math.random()-.5)*.18,
    ph:Math.random()*Math.PI*2, col:COLS[Math.floor(Math.random()*COLS.length)]
  });

  setInterval(function(){
    if(Math.random()<.28) sparks.push({
      x:Math.random()*W, y:H+8,
      vx:(Math.random()-.5)*2.8, vy:-(Math.random()*4.5+3.5),
      life:1, dec:Math.random()*.018+.014,
      col:COLS[Math.floor(Math.random()*COLS.length)]
    });
  },380);

  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(function(p){
      p.y+=p.vy; p.x+=p.vx; p.ph+=.019;
      var op=.12+Math.sin(p.ph)*.18+Math.abs(Math.sin(p.ph*.65))*.18;
      if(p.y<-8){ p.y=H+5; p.x=Math.random()*W; }
      if(p.x<0) p.x=W; if(p.x>W) p.x=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.col; ctx.globalAlpha=Math.max(0,op); ctx.fill();
    });
    sparks.forEach(function(s){
      s.x+=s.vx; s.y+=s.vy; s.vy+=.14; s.life-=s.dec;
      if(s.life<=0) return;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.life*2.2,0,Math.PI*2);
      ctx.fillStyle=s.col; ctx.globalAlpha=s.life*.65; ctx.fill();
    });
    sparks=sparks.filter(function(s){return s.life>0;});
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  })();
})();

// ── WHEELS ───────────────────────────────────────
function buildWheels(){
  for(var w=0;w<4;w++){
    var s=document.getElementById('ws'+w); if(!s) return;
    var h='';
    for(var r=0;r<3;r++) for(var d=0;d<10;d++) h+='<div class="wdig">'+d+'</div>';
    s.innerHTML=h;
    centerWheel(w,null);
  }
}

function gdh(strip,wheel){
  var f=strip.querySelector('.wdig');
  var dh=f?f.offsetHeight:0;
  if(!dh) dh=Math.round(wheel.offsetHeight/3);
  return dh||80;
}

function centerWheel(w,digit){
  var strip=document.getElementById('ws'+w); if(!strip) return;
  var wheel=document.getElementById('w'+w); if(!wheel) return;
  var dh=gdh(strip,wheel), wHt=wheel.offsetHeight;
  if(digit===null){
    strip.style.transition='none';
    strip.style.transform='translateY('+((wHt/2)-(dh/2))+'px)';
    strip.querySelectorAll('.wdig').forEach(function(el){el.style.color='';el.classList.remove('active');});
    return;
  }
  var idx=10+digit, off=-(idx*dh)+(wHt/2)-(dh/2);
  strip.style.transition='none';
  strip.style.transform='translateY('+off+'px)';
  strip.querySelectorAll('.wdig').forEach(function(el,i){ el.classList.toggle('active',i===idx); });
}

function spinWheel(w,finalDigit,duration,done){
  var strip=document.getElementById('ws'+w); if(!strip){if(done)done();return;}
  var wheel=document.getElementById('w'+w); if(!wheel){if(done)done();return;}
  var dh=gdh(strip,wheel), wHt=wheel.offsetHeight;
  if(!dh||!wHt){if(done)done();return;}

  wheel.classList.add('spinning');
  playSpinSound(duration);

  var finalIdx=10+finalDigit;
  var finalOff=-(finalIdx*dh)+(wHt/2)-(dh/2);
  var startOff=(wHt/2)-(dh/2);

  strip.style.transition='none';
  strip.style.transform='translateY('+startOff+'px)';
  strip.getBoundingClientRect();
  strip.style.transition='transform '+duration+'ms cubic-bezier(.16,1,.3,1)';
  strip.style.transform='translateY('+finalOff+'px)';

  setTimeout(function(){
    wheel.classList.remove('spinning');
    wheel.classList.add('landed');
    setTimeout(function(){wheel.classList.remove('landed');},500);
    strip.querySelectorAll('.wdig').forEach(function(el,i){ el.classList.toggle('active',i===finalIdx); });
    playLandSound();
    if(done) done();
  }, duration+60);
}

function spinAll(digits,onDone){
  var dur=2700, gap=480;
  function next(i){
    if(i>=4){if(onDone)onDone();return;}
    if(digits[i]===null){next(i+1);return;}
    spinWheel(i,digits[i],dur,function(){setTimeout(function(){next(i+1);},gap);});
  }
  next(0);
}

// ── POLL ─────────────────────────────────────────
function poll(){
  fetch(SB_URL+'/functions/v1/get-sorteo',{
    headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
  })
  .then(function(r){return r.json();})
  .then(function(s){
    if(!s||s.error||!s.estado) return;
    var key=s.estado+'|'+[s.digito_0,s.digito_1,s.digito_2,s.digito_3].join(',');
    if(key===state.lastKey) return;
    state.lastKey=key; applyState(s);
  }).catch(function(){});
}

// ── STATE MACHINE ─────────────────────────────────
function applyState(s){
  var badge=document.getElementById('badge');
  var btxt=document.getElementById('badgetxt');
  var msg=document.getElementById('msg');

  if(s.estado==='pendiente'){
    clearFlowTimers();
    hideCue();
    setStage('pendiente');
    state.seenPendiente=true;
    badge.className='pen'; btxt.textContent='Esperando inicio del sorteo';
    msg.textContent='Transmisión en vivo — El sorteo comenzará en breve...';
    msg.style.display='block';
    document.getElementById('winner-ov').classList.remove('show');
    for(var w=0;w<4;w++) centerWheel(w,null);
    state.spinning=false; state.revealed=false; state.digits=[null,null,null,null];
  }
  else if(s.estado==='girando'&&!state.spinning&&!state.revealed){
    clearFlowTimers();
    setStage('girando');
    badge.className='gir'; btxt.textContent='Preparando extracción';
    msg.textContent='Preparando escena oficial del sorteo...';
    msg.style.display='block';
    state.spinning=true;
    state.digits=[s.digito_0,s.digito_1,s.digito_2,s.digito_3];
    if(state.seenPendiente){
      showCue('Preparando sorteo oficial','prep');
      playBuildSound();
      queueTimer(function(){
        showCue('Buena suerte a todos','prep');
        msg.textContent='Iniciando extracción de números...';
      },1200);
      queueTimer(function(){
        hideCue();
        btxt.textContent='🎰 Sorteando...';
        msg.style.display='none';
        spinAll(state.digits);
      },2350);
    }
  }
  else if(s.estado==='revelado'&&!state.revealed){
    clearFlowTimers();
    setStage('revelado');
    state.revealed=true; state.spinning=false;
    badge.className='rev'; btxt.textContent='✅ ¡Número ganador revelado!';
    msg.style.display='none';
    var digs=[s.digito_0,s.digito_1,s.digito_2,s.digito_3];
    if(state.digits[0]===null){
      playBuildSound();
      queueTimer(function(){spinAll(digs,function(){startRevealSequence(digs);});},700);
    } else {
      startRevealSequence(digs);
    }
  }
}

// ── WINNER REVEAL ─────────────────────────────────
function doFlash(){
  var el=document.getElementById('flash');
  el.classList.add('on');
  setTimeout(function(){el.classList.remove('on');},600);
}

function showWinner(digs){
  var num=digs[0]*1000+digs[1]*100+digs[2]*10+digs[3];
  fetch(SB_URL+'/rest/v1/ventas?numeros_accion=cs.{'+num+'}&estado=eq.confirmado&select=nombre,cedula&limit=1',{
    headers:{'apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON}
  })
  .then(function(r){return r.json();})
  .then(function(d){revealCard(num,d&&d[0]?d[0]:null);})
  .catch(function(){revealCard(num,null);});
}

function revealCard(num,winner){
  doFlash();
  setTimeout(function(){
    document.getElementById('main').animate([
      {transform:'translate3d(0,0,0)'},
      {transform:'translate3d(4px,0,0)'},
      {transform:'translate3d(-4px,0,0)'},
      {transform:'translate3d(3px,0,0)'},
      {transform:'translate3d(0,0,0)'}
    ],{duration:420,easing:'cubic-bezier(.23,1,.32,1)'});
    showCue('Resultado oficial','winner');
    document.getElementById('wnum').textContent='Acción #'+String(num).padStart(4,'0');
    if(winner){
      document.getElementById('wnom').textContent=winner.nombre;
      document.getElementById('wced').textContent='Cédula: '+winner.cedula;
      document.getElementById('msg').textContent='Resultado certificado ante notaría pública';
    } else {
      document.getElementById('wnom').textContent='NÚMERO NO ASIGNADO';
      document.getElementById('wced').textContent='Se realizará nueva extracción ante el Notario';
      document.getElementById('msg').textContent='Se realizará una nueva extracción oficial';
    }
    document.getElementById('msg').style.display='block';
    queueTimer(hideCue,2000);
    document.getElementById('winner-ov').classList.add('show');
    playWinnerSound();
    confetti();
  },220);
}

function confetti(){
  var cols=['#FFD600','#FF6B35','#00C853','#FFFFFF','#FF4444','#FFE55C','#4FC3F7'];
  for(var i=0;i<240;i++){(function(i){
    setTimeout(function(){
      var el=document.createElement('div'); el.className='conf';
      var sz=Math.random()*13+4, isRect=Math.random()>.38;
      el.style.cssText=
        'left:'+Math.random()*100+'vw;top:-20px;'+
        'width:'+sz+'px;height:'+(isRect?sz*.35:sz)+'px;'+
        'background:'+cols[Math.floor(Math.random()*cols.length)]+';'+
        'border-radius:'+(isRect?'2px':'50%')+';'+
        'animation-duration:'+(Math.random()*3+2.5)+'s;'+
        'transform:rotate('+Math.random()*360+'deg)';
      document.body.appendChild(el);
      setTimeout(function(){el.parentNode&&el.parentNode.removeChild(el);},6500);
    },i*16);
  })(i);}
}

// ── localStorage sync ─────────────────────────────
window.addEventListener('storage',function(e){
  if(e.key!=='rifa_ev'||!e.newValue) return;
  try{
    var m=JSON.parse(e.newValue);
    if(m.t==='rst'){state.lastKey='';applyState({estado:'pendiente',digito_0:null,digito_1:null,digito_2:null,digito_3:null});}
  }catch(x){}
});

// ── INIT ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  initProjectorMode();
  setStage('pendiente');
  window.addEventListener('keydown',function(e){
    if(e.key==='p'||e.key==='P') setProjectorMode(!projectorMode);
  });
  buildWheels();
  poll();
  pollTimer=setInterval(poll,2000);
});
</script>
